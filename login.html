<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form</title>
    <style>
    body{
        background-color: #1a1a1a;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center ;
        align-items: center;
    }
    .card{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #2c2c2c;
        border-radius: 10px;
        padding: 30px;
        width: 300px;
    }
    h2{
        background-color: #2c2c2c;
        text-align: center;
        margin-bottom: 30px;
    }
    form{
        display: flex;
        flex-direction: column;
        //gap: 10px;
    }
    input{
        margin-bottom:15px ;
        padding: 10px;
        border-radius: 10px;
    }
    button{
        background-color: #231f23;
        color: #e8e2e9;
        border-radius: 10px;
        margin: 10px;
        padding: 5px;
    }
    button:hover{
        background-color: #7d3232;
    }
    </style>
</head>
<body>
    <div class="card">
        <h2>LOGIN</h2>
        <form >
            <input type="email" name="" id="" placeholder="Email">
            
            <input type="password" name="" id="" placeholder="Password">
            <button type="submit">Login</button>
        
        </form>
    </div>

</body>
</html>
